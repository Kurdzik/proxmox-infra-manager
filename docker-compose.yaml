networks:
  app-network:
    name: infra-manager-network

volumes:
  nginx_conf_volume:
  nginx_stream_volume:
  plugins_volume:

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  RABBITMQ_USER: ${RABBITMQ_USER:-guest}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
  RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  SECRET_KEY: ${SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_DB_LEVEL: ${LOG_DB_LEVEL:-WARNING}
  NGINX_CONF_DIR: /etc/nginx/conf.d
  NGINX_STREAM_DIR: /etc/nginx/stream.d
  NGINX_CONTAINER_NAME: infra-manager-nginx
  PLUGINS_BASE_DIR: ${PLUGINS_BASE_DIR:-/plugins}

services:
  migrations:
    container_name: infra-manager-migrations
    build:
      context: ./backend
      dockerfile: ../dockerfiles/Dockerfile.backend
    command: ["sh", "-c", "cd /app && uv run alembic upgrade head"]
    environment:
      <<: *common-env
    networks:
      - app-network
    depends_on:
      app_db:
        condition: service_healthy
    restart: "no"

  frontend:
    container_name: infra-manager-frontend
    build:
      context: ./frontend
      dockerfile: ../dockerfiles/Dockerfile.frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}
    ports:
      - "3333:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: infra-manager-backend
    build:
      context: ./backend
      dockerfile: ../dockerfiles/Dockerfile.backend
    ports:
      - "8080:8000"
    command: ["sh", "-c", "uv run uvicorn src.services.main:app --host 0.0.0.0 --port 8000 --workers 1 --no-access-log"]
    environment:
      <<: *common-env
    volumes:
      - plugins_volume:/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    container_name: infra-manager-worker
    build:
      context: ./backend
      dockerfile: ../dockerfiles/Dockerfile.backend
    command: ["sh", "-c", "uv run celery -A src.services.worker worker --loglevel=info"]
    environment:
      <<: *common-env
    volumes:
      - nginx_conf_volume:/etc/nginx/conf.d
      - nginx_stream_volume:/etc/nginx/stream.d
      - plugins_volume:/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      - app-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    container_name: infra-manager-scheduler
    build:
      context: ./backend
      dockerfile: ../dockerfiles/Dockerfile.backend
    command: ["sh", "-c", "uv run celery -A src.services.worker beat --loglevel=info"]
    environment:
      <<: *common-env
    networks:
      - app-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    container_name: infra-manager-nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_conf_volume:/etc/nginx/conf.d:ro
      - nginx_stream_volume:/etc/nginx/stream.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    restart: unless-stopped

  rabbitmq:
    container_name: infra-manager-rabbitmq
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app_db:
    container_name: infra-manager-app-db
    image: postgres:17
    ports:
      - "5678:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-infra_manager_db}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-infra_manager_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
